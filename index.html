<!DOCTYPE html>
<html>
<head>
  <title>hey daddy clicker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      font-family: 'Courier New', monospace;
      color: #eee;
      min-height: 100vh;
      padding: 10px;
    }

    h1 {
      text-align: center;
      font-size: 26px;
      color: #ffd700;
      padding: 10px 0 4px 0;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #counter {
      text-align: center;
      font-size: 30px;
      color: #fff;
      font-weight: bold;
      margin: 4px 0 2px 0;
    }

    #per-sec {
      text-align: center;
      font-size: 14px;
      color: #aaa;
      margin-bottom: 10px;
    }

    #main {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
      max-width: 900px;
      margin: 0 auto;
    }

    /* STATS */
    #stats {
      background: #16213e;
      border: 2px solid #0f3460;
      padding: 10px;
      width: 160px;
      font-size: 13px;
      flex-shrink: 0;
    }

    #stats h2 {
      font-size: 15px;
      color: #ffd700;
      border-bottom: 1px solid #0f3460;
      padding-bottom: 5px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    #stats p {
      margin: 4px 0;
      color: #ccc;
    }

    #stats span {
      color: #fff;
      font-weight: bold;
    }

    /* CLICKER */
    #clicker-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    #daddy-wrap {
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #16213e;
      border: 3px solid #0f3460;
      cursor: pointer;
      user-select: none;
    }

    #daddy-wrap:active {
      border-color: #ffd700;
    }

    #daddy {
      max-width: 170px;
      max-height: 170px;
      display: block;
      pointer-events: none;
    }

    #click-label {
      font-size: 12px;
      color: #888;
      margin-top: 6px;
    }

    #click-power-label {
      font-size: 13px;
      color: #ffd700;
      margin-top: 3px;
    }

    /* UPGRADES */
    #upgrades {
      background: #16213e;
      border: 2px solid #0f3460;
      padding: 10px;
      width: 270px;
      flex-shrink: 0;
    }

    #upgrades h2 {
      font-size: 15px;
      color: #ffd700;
      border-bottom: 1px solid #0f3460;
      padding-bottom: 5px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .upgrade-btn {
      display: block;
      width: 100%;
      background: #0f3460;
      border: 1px solid #1a5276;
      padding: 7px 8px;
      margin-bottom: 6px;
      cursor: pointer;
      text-align: left;
      font-family: 'Courier New', monospace;
      color: #eee;
      font-size: 12px;
    }

    .upgrade-btn:hover:not(:disabled) {
      background: #1a4a7a;
      border-color: #ffd700;
    }

    .upgrade-btn:disabled {
      background: #111827;
      color: #555;
      border-color: #222;
      cursor: default;
    }

    .upg-name {
      font-weight: bold;
      font-size: 13px;
      display: block;
      color: #fff;
    }

    .upgrade-btn:disabled .upg-name {
      color: #555;
    }

    .upg-desc {
      display: block;
      font-size: 11px;
      color: #888;
      margin-top: 1px;
    }

    .upg-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 3px;
    }

    .upg-cost {
      font-size: 12px;
      color: #ffd700;
    }

    .upgrade-btn:disabled .upg-cost {
      color: #555;
    }

    .upg-owned {
      font-size: 11px;
      color: #aaa;
    }

    #audio-note {
      text-align: center;
      font-size: 11px;
      color: #555;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<h1>hey daddy clicker</h1>
<div id="counter">0 daddies</div>
<div id="per-sec">0.0 per second</div>

<div id="main">

  <div id="stats">
    <h2>stats</h2>
    <p>clicks: <span id="stat-clicks">0</span></p>
    <p>total: <span id="stat-total">0</span></p>
    <p>upgrades: <span id="stat-upg">0</span></p>
    <p>per click: <span id="stat-cpc">1</span></p>
    <p>per sec: <span id="stat-cps">0.0</span></p>
  </div>

  <div id="clicker-area">
    <div id="daddy-wrap" onclick="doClick()">
      <img id="daddy" src="https://raw.githubusercontent.com/messenger-co/hey-daddy-clicker/main/image.png" alt="daddy" />
    </div>
    <div id="click-label">click daddy</div>
    <div id="click-power-label">+<span id="cpc-show">1</span> per click</div>
  </div>

  <div id="upgrades">
    <h2>upgrades</h2>
    <div id="upgrade-list"></div>
  </div>

</div>

<p id="audio-note">♪ music auto-plays on first click</p>

<audio id="bgm" loop>
  <source src="https://raw.githubusercontent.com/messenger-co/hey-daddy-clicker/main/tam.mp4" type="video/mp4">
</audio>

<script>
  var cookies = 0;
  var totalEarned = 0;
  var totalClicks = 0;
  var clickPower = 1;
  var perSecond = 0;
  var audioStarted = false;

  var upgrades = [
    { id:0, name:"better finger",     desc:"+1 per click",      baseCost:10,    bought:0, type:"click", value:1 },
    { id:1, name:"grandma",           desc:"+0.1/sec",          baseCost:50,    bought:0, type:"auto",  value:0.1 },
    { id:2, name:"strong finger",     desc:"+3 per click",      baseCost:100,   bought:0, type:"click", value:3 },
    { id:3, name:"a dog",             desc:"+0.5/sec",          baseCost:250,   bought:0, type:"auto",  value:0.5 },
    { id:4, name:"robot hand",        desc:"+5 per click",      baseCost:500,   bought:0, type:"click", value:5 },
    { id:5, name:"a whole farm",      desc:"+2/sec",            baseCost:1000,  bought:0, type:"auto",  value:2 },
    { id:6, name:"laser finger",      desc:"+15 per click",     baseCost:2500,  bought:0, type:"click", value:15 },
    { id:7, name:"daddy factory",     desc:"+10/sec",           baseCost:5000,  bought:0, type:"auto",  value:10 },
    { id:8, name:"dad dimension",     desc:"+50 per click",     baseCost:10000, bought:0, type:"click", value:50 },
    { id:9, name:"infinite daddies",  desc:"+50/sec",           baseCost:25000, bought:0, type:"auto",  value:50 }
  ];

  function getCost(u) {
    return Math.floor(u.baseCost * Math.pow(1.15, u.bought));
  }

  function doClick() {
    cookies += clickPower;
    totalEarned += clickPower;
    totalClicks++;

    if (!audioStarted) {
      document.getElementById("bgm").play().catch(function(){});
      audioStarted = true;
      document.getElementById("audio-note").textContent = "♪ music playing";
    }

    updateDisplay();
  }

  function buyUpgrade(id) {
    var u = upgrades[id];
    var cost = getCost(u);
    if (cookies >= cost) {
      cookies -= cost;
      u.bought++;
      if (u.type === "click") {
        clickPower += u.value;
      } else {
        perSecond += u.value;
      }
      updateDisplay();
      renderUpgrades();
    }
  }

  function updateDisplay() {
    document.getElementById("counter").textContent = Math.floor(cookies) + " daddies";
    document.getElementById("per-sec").textContent = perSecond.toFixed(1) + " per second";
    document.getElementById("stat-clicks").textContent = totalClicks;
    document.getElementById("stat-total").textContent = Math.floor(totalEarned);
    document.getElementById("stat-cpc").textContent = clickPower;
    document.getElementById("stat-cps").textContent = perSecond.toFixed(1);
    document.getElementById("cpc-show").textContent = clickPower;

    var owned = 0;
    for (var i = 0; i < upgrades.length; i++) owned += upgrades[i].bought;
    document.getElementById("stat-upg").textContent = owned;
  }

  function renderUpgrades() {
    var list = document.getElementById("upgrade-list");
    list.innerHTML = "";
    for (var i = 0; i < upgrades.length; i++) {
      var u = upgrades[i];
      var cost = getCost(u);
      var btn = document.createElement("button");
      btn.className = "upgrade-btn";
      btn.disabled = cookies < cost;
      btn.setAttribute("data-id", String(i));
      btn.innerHTML =
        '<span class="upg-name">' + u.name + '</span>' +
        '<span class="upg-desc">' + u.desc + '</span>' +
        '<div class="upg-row">' +
          '<span class="upg-cost">' + cost + ' daddies</span>' +
          '<span class="upg-owned">owned: ' + u.bought + '</span>' +
        '</div>';
      btn.addEventListener("click", function() {
        buyUpgrade(parseInt(this.getAttribute("data-id")));
      });
      list.appendChild(btn);
    }
  }

  // auto clicker tick
  setInterval(function() {
    if (perSecond > 0) {
      var gain = perSecond / 20;
      cookies += gain;
      totalEarned += gain;
      updateDisplay();
      renderUpgrades();
    }
  }, 50);

  renderUpgrades();
  updateDisplay();
</script>

</body>
</html>
